// ─────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────
function fmt(n, d = 0) {
  if (n === null || n === undefined || !isFinite(n)) return '—';
  return Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
}
function iso(d) { return d.toISOString().slice(0, 10); }
function parseDate(s) { return new Date(s + 'T00:00:00Z'); }
function addDays(d, n) { const r = new Date(d); r.setUTCDate(r.getUTCDate() + n); return r; }
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s; }

async function fetchAll(table, orderCol = null) {
  const page = 1000;
  let all = [];
  let from = 0;
  while (true) {
    let q = sb.from(table).select('*').range(from, from + page - 1);
    if (orderCol) q = q.order(orderCol);
    const { data, error } = await q;
    if (error) throw error;
    all = all.concat(data);
    if (data.length < page) break;
    from += page;
  }
  return all;
}

// ─────────────────────────────────────────────────────────────
// Metrics
// ─────────────────────────────────────────────────────────────
function calcMetrics(items, transactions, asOfDate = new Date()) {
  const cutoff = iso(addDays(asOfDate, -365));
  const byItem = {};
  for (const it of items) byItem[it.id] = { item: it, onHand: 0, usage12m: 0 };
  for (const tx of transactions) {
    const r = byItem[tx.item_id];
    if (!r) continue;
    r.onHand += tx.quantity;
    if (tx.quantity < 0 && tx.date >= cutoff) r.usage12m += -tx.quantity;
  }
  return Object.values(byItem).map(r => {
    const avgMonthly        = r.usage12m / 12;
    const mos               = avgMonthly > 0 ? r.onHand / avgMonthly : null;
    const daysLeft          = avgMonthly > 0 ? r.onHand / (avgMonthly / 30) : null;
    const leadTimeMos       = (r.item.lead_time_days || 0) / 30;
    const effectiveTargetMos = (r.item.target_mos || 0) + leadTimeMos;
    const targetStock       = avgMonthly * effectiveTargetMos;
    const pack              = r.item.case_pack || 1;
    const shortfall         = Math.max(0, targetStock - r.onHand);
    const suggested         = Math.ceil(shortfall / pack) * pack;
    let status;
    if (avgMonthly === 0) status = 'No Usage';
    else if (mos < effectiveTargetMos) status = 'Reorder';
    else if (mos > 1.5 * effectiveTargetMos) status = 'Overstock';
    else status = 'OK';
    return { ...r, avgMonthly, mos, daysLeft, leadTimeMos, effectiveTargetMos, targetStock, suggested, status };
  });
}

function mosColor(mos, effectiveTarget) {
  if (mos === null || mos === undefined || !isFinite(mos)) return 'bg-ink-line text-fog-mute';
  const r = mos / (effectiveTarget || 1);
  if (r < 0.4) return 'bg-danger text-white';
  if (r < 0.8) return 'bg-red-700 text-white';
  if (r < 1.0) return 'bg-orange text-white';
  if (r < 1.3) return 'bg-lime-500 text-ink-bg';
  if (r < 1.6) return 'bg-ok text-white';
  return 'bg-warn text-white';
}

}

// ─────────────────────────────────────────────────────────────

function Dashboard({ items, transactions }) {
  const metrics = useMemo(() => calcMetrics(items, transactions), [items, transactions]);
  const active = metrics.filter(m => m.item.active);
  const atRiskRows = active.filter(m => m.daysLeft !== null && m.daysLeft < (m.item.lead_time_days || 0));
  const thisMonth = iso(new Date()).slice(0, 7);
  const txThisMonth = transactions.filter(t => t.date && t.date.slice(0, 7) === thisMonth).length;
  const kpis = {
    reorder:   active.filter(m => m.status === 'Reorder').length,
    atRisk:    atRiskRows.length,
    overstock: active.filter(m => m.status === 'Overstock').length,
    ok:        active.filter(m => m.status === 'OK').length,
    noUsage:   active.filter(m => m.status === 'No Usage').length,
    txMonth:   txThisMonth,
    total:     active.reduce((s, m) => s + m.usage12m, 0),
  };
  const reorderRows = active.filter(m => m.status === 'Reorder').sort((a, b) => (a.mos ?? 0) - (b.mos ?? 0));
  const allRows = [...active].sort((a, b) => a.item.name.localeCompare(b.item.name));

  const itemMap = useMemo(() => Object.fromEntries(items.map(i => [i.id, i])), [items]);
  const recentTx = useMemo(
    () => [...transactions]
      .sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : (b.created_at || '').localeCompare(a.created_at || '')))
      .slice(0, 10),
    [transactions]
  );
  const topMovers = useMemo(() => {
    const cutoff = iso(addDays(new Date(), -30));
    const usage = {};
    for (const t of transactions) {
      if (t.quantity >= 0 || t.date < cutoff) continue;
      usage[t.item_id] = (usage[t.item_id] || 0) + (-t.quantity);
    }
    return Object.entries(usage)
      .map(([id, qty]) => ({ item: itemMap[id], qty }))
      .filter(r => r.item)
      .sort((a, b) => b.qty - a.qty)
      .slice(0, 10);
  }, [transactions, itemMap]);

  return (
    <div className="space-y-5">
      <div>
        <div className="text-[12px] uppercase tracking-[.1em] text-fog-mute">Inventory overview</div>
        <h2 className="text-[28px] font-bold tracking-[-.015em] text-fog mt-1">Dashboard</h2>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
        <KPICard label="To Reorder" value={kpis.reorder} color="bg-danger" />
        <KPICard label="At Risk" value={kpis.atRisk} color="bg-orange" />
        <KPICard label="Overstock" value={kpis.overstock} color="bg-warn" />
        <KPICard label="OK" value={kpis.ok} color="bg-ok" />
        <KPICard label="No Usage" value={kpis.noUsage} color="bg-fog-mute" />
        <KPICard label="Tx This Month" value={fmt(kpis.txMonth)} color="bg-info" />
        <KPICard label="12M Usage" value={fmt(kpis.total)} color="bg-accent" />
      </div>

      <Section title={`Reorder Now · ${reorderRows.length} items`}>
        <Table>
          <thead>
            <tr>
              <Th>SKU</Th><Th>Item</Th><Th>On Hand</Th><Th>Avg/Mo</Th>
              <Th>Days Left</Th><Th>MOS</Th><Th>Target MOS</Th><Th>Lead (d)</Th><Th>Suggested Qty</Th>
            </tr>
          </thead>
          <tbody>
            {reorderRows.map(m => (
              <tr key={m.item.id} className="border-t border-ink-line hover:bg-okdim/30">
                <Td className="text-fog-mute font-mono text-[11px]">{m.item.sku || '—'}</Td>
                <Td className="font-semibold">{m.item.name}</Td>
                <Td>{fmt(m.onHand)}</Td>
                <Td>{fmt(m.avgMonthly, 1)}</Td>
                <Td>{m.daysLeft === null ? '—' : fmt(Math.round(m.daysLeft))}</Td>
                <Td><span className={`px-2 py-0.5 text-[11px] font-bold rounded ${mosColor(m.mos, m.effectiveTargetMos)}`}>{fmt(m.mos, 1)}</span></Td>
                <Td className="text-fog-mute">{m.item.target_mos}</Td>
                <Td className="text-fog-mute">{m.item.lead_time_days}</Td>
                <Td className="font-bold text-accent">{fmt(m.suggested)}</Td>
              </tr>
            ))}
            {reorderRows.length === 0 && (
              <tr><td colSpan="9" className="text-center py-6 text-fog-mute">Nothing to reorder</td></tr>
            )}
          </tbody>
        </Table>
      </Section>

      <Section title={`At Risk · ${atRiskRows.length} items`}>
        <Table>
          <thead>
            <tr>
              <Th>SKU</Th><Th>Item</Th><Th>On Hand</Th><Th>Avg/Mo</Th>
              <Th>Days Left</Th><Th>Lead (d)</Th><Th>Gap (d)</Th>
            </tr>
          </thead>
          <tbody>
            {[...atRiskRows].sort((a, b) => (a.daysLeft - a.item.lead_time_days) - (b.daysLeft - b.item.lead_time_days)).map(m => {
              const gap = Math.round(m.daysLeft - m.item.lead_time_days);
              const sevColor = gap <= -25 ? 'text-danger' : gap <= -15 ? 'text-orange' : 'text-warn';
              const sevBg    = gap <= -25 ? 'bg-danger' : gap <= -15 ? 'bg-orange' : 'bg-warn';
              return (
                <tr key={m.item.id} className="border-t border-ink-line" style={{ backgroundColor: 'rgba(249,115,22,.04)' }}>
                  <Td className="text-fog-mute font-mono text-[11px]">
                    <span className={`inline-block w-[3px] h-[14px] ${sevBg} rounded mr-2 align-middle`} />
                    {m.item.sku || '—'}
                  </Td>
                  <Td className="font-semibold">{m.item.name}</Td>
                  <Td>{fmt(m.onHand)}</Td>
                  <Td>{fmt(m.avgMonthly, 1)}</Td>
                  <Td className="font-bold">{fmt(Math.round(m.daysLeft))}d</Td>
                  <Td className="text-fog-mute">{m.item.lead_time_days}d</Td>
                  <Td className={`${sevColor} font-bold`}>{gap}d</Td>
                </tr>
              );
            })}
            {atRiskRows.length === 0 && (
              <tr><td colSpan="7" className="text-center py-6 text-fog-mute">No items at risk</td></tr>
            )}
          </tbody>
        </Table>
      </Section>

      <div className="grid md:grid-cols-2 gap-5">
        <Section title="Top Movers (last 30 days)">
          <Table>
            <thead>
              <tr><Th>SKU</Th><Th>Item</Th><Th className="text-right pr-5">Used</Th></tr>
            </thead>
            <tbody>
              {topMovers.map(r => (
                <tr key={r.item.id} className="border-t border-ink-line">
                  <Td className="text-fog-mute font-mono text-[11px]">{r.item.sku || '—'}</Td>
                  <Td className="font-semibold">{r.item.name}</Td>
                  <Td className="text-right pr-5 font-bold">{fmt(r.qty)}</Td>
                </tr>
              ))}
              {topMovers.length === 0 && (
                <tr><td colSpan="3" className="text-center py-6 text-fog-mute">No usage recorded in the last 30 days</td></tr>
              )}
            </tbody>
          </Table>
        </Section>

        <Section title="Recent Activity">
          <Table>
            <thead>
              <tr><Th>Date</Th><Th>Item</Th><Th>Qty</Th><Th>By</Th></tr>
            </thead>

              {recentTx.map(t => {
                const it = itemMap[t.item_id];
                return (
                  <tr key={t.id} className="border-t border-ink-line">

              {recentTx.length === 0 && (
                <tr><td colSpan="4" className="text-center py-6 text-fog-mute">No transactions yet</td></tr>
              )}
            </tbody>
          </Table>
        </Section>
      </div>

      <Section title={`All Items Status · ${allRows.length} active`}>
        <Table>
          <thead>
            <tr>
              <Th>SKU</Th><Th>Item</Th><Th>On Hand</Th><Th>12M Usage</Th><Th>Avg/Mo</Th>
              <Th>MOS</Th><Th>Target</Th><Th>Status</Th>
            </tr>
          </thead>
          <tbody>
            {allRows.map(m => (
              <tr key={m.item.id} className="border-t border-ink-line">
                <Td className="text-fog-mute font-mono text-[11px]">{m.item.sku || '—'}</Td>
                <Td className="font-semibold">{m.item.name}</Td>
                <Td>{fmt(m.onHand)}</Td>
                <Td>{fmt(m.usage12m)}</Td>
                <Td>{fmt(m.avgMonthly, 1)}</Td>
                <Td><span className={`px-2 py-0.5 text-[11px] font-bold rounded ${mosColor(m.mos, m.effectiveTargetMos)}`}>{fmt(m.mos, 1)}</span></Td>
                <Td className="text-fog-mute">{m.item.target_mos}</Td>
                <Td><StatusBadge status={m.status} /></Td>
              </tr>
            ))}
          </tbody>
        </Table>
      </Section>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Enter Transaction
// ─────────────────────────────────────────────────────────────
function TransactionPage({ items, session, onSaved }) {
  const [date, setDate] = useState(iso(new Date()));
  const [po, setPo] = useState('');
  const [itemId, setItemId] = useState('');
  const [qty, setQty] = useState('');
  const [sign, setSign] = useState('+');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  const activeItems = items.filter(i => i.active).sort((a, b) => a.name.localeCompare(b.name));

  async function submit(e) {
    e.preventDefault();
    setMsg(null);
    if (!itemId) { setMsg({ err: 'Select an item' }); return; }
    const n = parseInt(qty);
    if (isNaN(n) || n <= 0) { setMsg({ err: 'Quantity must be a positive whole number' }); return; }
    if (!date) { setMsg({ err: 'Date required' }); return; }
    const q = sign === '-' ? -n : n;
    setSaving(true);
    const { error } = await sb.from('transactions').insert({
      date,
      po_number: po.trim() || null,
      item_id: itemId,
      quantity: q,
      user_email: session?.user?.email || null,
    });
    setSaving(false);
    if (error) { setMsg({ err: error.message }); return; }
    setMsg({ ok: `Saved: ${q > 0 ? '+' : ''}${q}` });
    setQty(''); setPo('');
    onSaved();
  }

  return (
    <div className="max-w-xl">
      <h2 className="text-2xl font-bold brand-text mb-4">Enter Transaction</h2>
      <form onSubmit={submit} className="bg-white rounded-lg shadow p-6 space-y-4">
        <Field label="Date">
          <input type="date" required value={date} onChange={e => setDate(e.target.value)} className="w-full border rounded px-3 py-2" />
        </Field>
        <Field label="PO #">
          <input type="text" value={po} onChange={e => setPo(e.target.value)} placeholder="Optional" className="w-full border rounded px-3 py-2" />
        </Field>
        <Field label="Item">
          <select required value={itemId} onChange={e => setItemId(e.target.value)} className="w-full border rounded px-3 py-2 bg-white">
            <option value="">Select item…</option>
            {activeItems.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
          </select>
        </Field>
        <Field label="Quantity">
          <div className="flex gap-2">
            <div className="flex rounded border overflow-hidden">
              <button type="button" onClick={() => setSign('+')}
                className={`px-4 py-2 text-sm font-medium ${sign === '+' ? 'bg-green-600 text-white' : 'bg-white text-slate-700'}`}>
                + Receipt
              </button>
              <button type="button" onClick={() => setSign('-')}
                className={`px-4 py-2 text-sm font-medium ${sign === '-' ? 'bg-red-600 text-white' : 'bg-white text-slate-700'}`}>
                − Usage
              </button>
            </div>
            <input type="number" min="1" step="1" required value={qty} onChange={e => setQty(e.target.value)}
              className="flex-1 border rounded px-3 py-2" placeholder="e.g. 25" />
          </div>
        </Field>
        <div className="flex items-center gap-3">
          <button type="submit" disabled={saving} className="brand text-white px-5 py-2 rounded font-medium disabled:opacity-50">
            {saving ? 'Saving…' : 'Save Transaction'}
          </button>
          {msg?.ok  && <span className="text-green-700 text-sm">✓ {msg.ok}</span>}
          {msg?.err && <span className="text-red-600 text-sm">{msg.err}</span>}
        </div>
      </form>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Transactions History (view / edit / delete)
// ─────────────────────────────────────────────────────────────
function TransactionsHistory({ items, transactions, session, onChange }) {
  const [search, setSearch] = useState('');
  const [start, setStart]   = useState('');
  const [end, setEnd]       = useState('');
  const [type, setType]     = useState('all');
  const [editing, setEditing] = useState(null);
  const [limit, setLimit]   = useState(100);
  const [sortKey, setSortKey] = useState('date');
  const [sortDir, setSortDir] = useState('desc');

  const itemMap = useMemo(() => Object.fromEntries(items.map(i => [i.id, i])), [items]);
  const activeItems = useMemo(() => items.filter(i => i.active).sort((a, b) => a.name.localeCompare(b.name)), [items]);

  function toggleSort(key) {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir(key === 'date' || key === 'created_at' ? 'desc' : 'asc'); }
  }

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    const valFor = (t, k) => {
      if (k === 'item') return (itemMap[t.item_id]?.name || '').toLowerCase();
      if (k === 'type') return t.quantity < 0 ? 'usage' : 'receipt';
      if (k === 'po_number') return (t.po_number || '').toLowerCase();
      if (k === 'user_email') return (t.user_email || '').toLowerCase();
      if (k === 'created_at') return t.created_at || '';
      if (k === 'quantity') return t.quantity;
      return t[k] || '';
    };
    const cmp = (a, b) => {
      const va = valFor(a, sortKey);
      const vb = valFor(b, sortKey);
      let r = (typeof va === 'number' && typeof vb === 'number') ? (va - vb) : (va < vb ? -1 : va > vb ? 1 : 0);
      if (r === 0 && sortKey !== 'date') r = (a.date < b.date ? 1 : a.date > b.date ? -1 : 0);
      return sortDir === 'asc' ? r : -r;
    };
    return transactions
      .filter(t => {
        if (start && t.date < start) return false;
        if (end   && t.date > end)   return false;
        if (type === 'usage' && t.quantity >= 0) return false;
        if (type === 'receipt' && t.quantity < 0) return false;
        if (q) {
          const it = itemMap[t.item_id];
          const hay = [it?.name, it?.sku, t.po_number, t.user_email].filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      })
      .sort(cmp);
  }, [transactions, search, start, end, type, itemMap, sortKey, sortDir]);

  const shown = filtered.slice(0, limit);

  async function deleteTx(id) {
    if (!confirm('Delete this transaction? This cannot be undone.')) return;
    const original = transactions.find(t => t.id === id);
    if (original) {
      await sb.from('transaction_audits').insert({
        transaction_id: id,
        action: 'delete',
        before_data: original,
        after_data: null,
        changed_by: session?.user?.email || null,
      });
    }
    const { error } = await sb.from('transactions').delete().eq('id', id);
    if (error) { alert(error.message); return; }
    onChange();
  }

  async function saveEdit() {
    const e = editing;
    if (!e) return;
    const n = parseInt(e.quantity);
    if (isNaN(n) || n === 0) { alert('Quantity must be a non-zero integer'); return; }
    const original = transactions.find(t => t.id === e.id);
    const updated = {
      date: e.date,
      po_number: (e.po_number || '').trim() || null,
      item_id: e.item_id,
      quantity: n,
    };
    if (original) {
      await sb.from('transaction_audits').insert({
        transaction_id: e.id,
        action: 'edit',
        before_data: original,
        after_data: { ...original, ...updated },
        changed_by: session?.user?.email || null,
      });
    }
    const { error } = await sb.from('transactions').update(updated).eq('id', e.id);
    if (error) { alert(error.message); return; }
    setEditing(null);
    onChange();
  }

  const typeSegments = [
    ['all',     'All'],
    ['usage',   'Usage −'],
    ['receipt', 'Receipt +'],
  ];

  return (
    <div className="space-y-5">
      <div>
        <div className="text-[12px] uppercase tracking-[.1em] text-fog-mute">History</div>
        <h2 className="text-[28px] font-bold tracking-[-.015em] text-fog mt-1">Transactions</h2>
      </div>

      <div className="bg-ink-panel border border-ink-line rounded-card p-4 flex flex-wrap items-end gap-3">
        <Field label="Search">
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="item, SKU, PO#, user…" className="border border-ink-line rounded-md px-3 py-2 w-64 text-[12px]" />
        </Field>
        <Field label="From">
          <input type="date" value={start} onChange={e => setStart(e.target.value)} className="border border-ink-line rounded-md px-3 py-2 text-[12px]" />
        </Field>
        <Field label="To">
          <input type="date" value={end} onChange={e => setEnd(e.target.value)} className="border border-ink-line rounded-md px-3 py-2 text-[12px]" />
        </Field>
        <Field label="Type">
          <div className="inline-flex rounded-md border border-ink-line overflow-hidden">
            {typeSegments.map(([v, l]) => (
              <button key={v} onClick={() => setType(v)}
                className={`px-3 py-2 text-[12px] font-semibold ${type === v ? 'bg-ok text-ink-bg' : 'text-fog-mute hover:text-fog'}`}>
                {l}
              </button>
            ))}
          </div>
        </Field>
        <button onClick={() => { setSearch(''); setStart(''); setEnd(''); setType('all'); }} className="text-[12px] text-fog-mute hover:text-fog ml-auto">Clear filters</button>
      </div>

      <Section title={`${filtered.length.toLocaleString()} transaction${filtered.length === 1 ? '' : 's'} — showing ${shown.length}`}>
        <Table>
          <thead>
            <tr>
              <SortableTh k="date"       sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}>Date</SortableTh>
              <SortableTh k="po_number"  sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}>PO#</SortableTh>
              <SortableTh k="item"       sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}>Item</SortableTh>
              <SortableTh k="quantity"   sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}>Qty</SortableTh>
              <SortableTh k="type"       sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}>Type</SortableTh>
              <SortableTh k="user_email" sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}>Entered By</SortableTh>
              <SortableTh k="created_at" sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}>Entered At</SortableTh>
              <Th className="text-right pr-5">Actions</Th>
            </tr>
          </thead>
          <tbody>
            {shown.map(t => {
              const it = itemMap[t.item_id];
              return (
                <tr key={t.id} className="border-t border-ink-line hover:bg-okdim/30">
                  <Td className="text-fog-mute text-[11px] whitespace-nowrap">{t.date}</Td>
                  <Td className="font-mono text-[11px] text-fog-mute">{t.po_number || '—'}</Td>
                  <Td className="font-medium">
                    {it?.sku && <span className="text-fog-mute font-mono text-[11px] mr-2">{it.sku}</span>}
                    {it?.name || <span className="text-danger">(deleted)</span>}
                  </Td>
                  <Td className={`font-bold ${t.quantity < 0 ? 'text-danger' : 'text-ok'}`}>{t.quantity > 0 ? '+' : ''}{t.quantity}</Td>
                  <Td>
                    <Pill tone={t.quantity < 0 ? 'danger' : 'ok'}>{t.quantity < 0 ? 'Usage' : 'Receipt'}</Pill>
                  </Td>
                  <Td className="text-[11px] text-fog-mute">{t.user_email ? t.user_email.split('@')[0] : ''}</Td>
                  <Td className="text-[11px] text-fog-mute whitespace-nowrap">{t.created_at ? new Date(t.created_at).toLocaleString() : ''}</Td>
                  <Td className="text-right pr-5 space-x-3 whitespace-nowrap">
                    <button onClick={() => setEditing({ ...t })} className="text-[11px] text-fog-mute hover:text-fog">Edit</button>
                    <button onClick={() => deleteTx(t.id)} className="text-[11px] text-danger hover:opacity-80">Del</button>
                  </Td>
                </tr>
              );
            })}
            {shown.length === 0 && (
              <tr><td colSpan="8" className="text-center py-6 text-fog-mute">No transactions match.</td></tr>
            )}
          </tbody>
        </Table>
        {filtered.length > shown.length && (
          <div className="p-3 text-center border-t border-ink-line">
            <button onClick={() => setLimit(n => n + 100)} className="text-[12px] text-ok font-semibold hover:underline">
              Load 100 more ({filtered.length - shown.length} remaining)
            </button>
          </div>
        )}
      </Section>

      {editing && (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onClick={() => setEditing(null)}>
          <div className="bg-ink-panel border border-ink-line rounded-card p-6 w-full max-w-md" onClick={e => e.stopPropagation()}>
            <h3 className="text-[15px] font-bold text-fog mb-4">Edit Transaction</h3>
            <div className="space-y-3">
              <Field label="Date">
                <input type="date" value={editing.date} onChange={e => setEditing({ ...editing, date: e.target.value })} className="w-full border border-ink-line rounded-md px-3 py-2 text-[12px]" />
              </Field>
              <Field label="PO #">
                <input value={editing.po_number || ''} onChange={e => setEditing({ ...editing, po_number: e.target.value })} className="w-full border border-ink-line rounded-md px-3 py-2 text-[12px]" />
              </Field>
              <Field label="Item">
                <select value={editing.item_id} onChange={e => setEditing({ ...editing, item_id: e.target.value })} className="w-full border border-ink-line rounded-md px-3 py-2 text-[12px]">
                  {activeItems.map(i => <option key={i.id} value={i.id}>{i.sku ? `${i.sku} — ${i.name}` : i.name}</option>)}
                  {!activeItems.find(i => i.id === editing.item_id) && itemMap[editing.item_id] && (
                    <option value={editing.item_id}>{itemMap[editing.item_id].name} (archived)</option>
                  )}
                </select>
              </Field>
              <Field label="Quantity (negative for usage)">
                <input type="number" value={editing.quantity} onChange={e => setEditing({ ...editing, quantity: e.target.value })} className="w-full border border-ink-line rounded-md px-3 py-2 text-[12px]" />
              </Field>
              <div className="text-xs text-slate-500">Originally entered by: {editing.user_email || '(unknown)'}</div>
            </div>
            <div className="flex gap-2 mt-5 justify-end">
              <button onClick={() => setEditing(null)} className="px-4 py-2 text-fog-mute hover:text-fog text-[12px]">Cancel</button>
              <button onClick={saveEdit} className="bg-ok text-ink-bg px-4 py-2 rounded-md font-semibold text-[12px]">Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Items
// ─────────────────────────────────────────────────────────────
function ItemsPage({ items, onChange }) {
  const [form, setForm] = useState({ sku: '', name: '', case_pack: 1, lead_time_days: 30, target_mos: 3 });
  const [adding, setAdding] = useState(false);
  const [addErr, setAddErr] = useState('');
  const [showArchived, setShowArchived] = useState(false);
  const [edits, setEdits] = useState({});
  const [search, setSearch] = useState('');

  async function add(e) {
    e.preventDefault();
    setAddErr('');
    if (!form.name.trim()) { setAddErr('Name required'); return; }
    setAdding(true);
    const { error } = await sb.from('items').insert({
      sku: form.sku.trim() || null,
      name: form.name.trim(),
      case_pack: parseInt(form.case_pack) || 1,
      lead_time_days: parseInt(form.lead_time_days) || 30,
      target_mos: parseInt(form.target_mos) || 3,
      active: true,
    });
    setAdding(false);
    if (error) { setAddErr(error.message); return; }
    setForm({ sku: '', name: '', case_pack: 1, lead_time_days: 30, target_mos: 3 });
    onChange();
  }

  async function saveRow(id) {
    const e = edits[id];
    if (!e) return;
    const patch = {};
    if ('sku' in e)            patch.sku            = e.sku.trim() || null;
    if ('name' in e)           patch.name           = e.name.trim();
    if ('case_pack' in e)      patch.case_pack      = parseInt(e.case_pack)      || 1;
    if ('lead_time_days' in e) patch.lead_time_days = parseInt(e.lead_time_days) || 0;
    if ('target_mos' in e)     patch.target_mos     = parseInt(e.target_mos)     || 0;
    const { error } = await sb.from('items').update(patch).eq('id', id);
    if (error) { alert(error.message); return; }
    setEdits(prev => { const n = { ...prev }; delete n[id]; return n; });
    onChange();
  }

  async function toggleArchive(it) {
    const { error } = await sb.from('items').update({ active: !it.active }).eq('id', it.id);
    if (error) { alert(error.message); return; }
    onChange();
  }

  const q = search.trim().toLowerCase();
  const rows = [...items]
    .filter(i => showArchived || i.active)
    .filter(i => !q || (i.name || '').toLowerCase().includes(q) || (i.sku || '').toLowerCase().includes(q))
    .sort((a, b) => (a.active === b.active ? a.name.localeCompare(b.name) : (a.active ? -1 : 1)));

  return (
    <div className="space-y-6">
      <h2 className="text-2xl font-bold brand-text">Items</h2>

      <Section title="Add New Item">
        <form onSubmit={add} className="p-5 grid grid-cols-1 md:grid-cols-6 gap-3">
          <Field label="SKU">
            <input value={form.sku} onChange={e => setForm({ ...form, sku: e.target.value })} placeholder="Optional" className="w-full border rounded px-3 py-2" />
          </Field>
          <Field label="Name">
            <input required value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} className="w-full border rounded px-3 py-2" />
          </Field>
          <Field label="Case Pack">
            <input type="number" min="1" value={form.case_pack} onChange={e => setForm({ ...form, case_pack: e.target.value })} className="w-full border rounded px-3 py-2" />
          </Field>
          <Field label="Lead Time (days)">
            <input type="number" min="0" value={form.lead_time_days} onChange={e => setForm({ ...form, lead_time_days: e.target.value })} className="w-full border rounded px-3 py-2" />
          </Field>
          <Field label="Target MOS">
            <input type="number" min="0" value={form.target_mos} onChange={e => setForm({ ...form, target_mos: e.target.value })} className="w-full border rounded px-3 py-2" />
          </Field>
          <div className="flex items-end">
            <button type="submit" disabled={adding} className="brand text-white px-4 py-2 rounded w-full disabled:opacity-50">
              {adding ? 'Adding…' : 'Add Item'}
            </button>
          </div>
          {addErr && <div className="md:col-span-6 text-red-600 text-sm">{addErr}</div>}
        </form>
      </Section>

      <Section
        title={`Items (${rows.length})`}
        right={
          <div className="flex items-center gap-4">
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search name or SKU…" className="border rounded px-3 py-1.5 text-sm" />
            <label className="flex items-center gap-2 text-sm text-slate-600">
              <input type="checkbox" checked={showArchived} onChange={e => setShowArchived(e.target.checked)} />
              Show archived
            </label>
          </div>
        }
      >
        <Table>
          <thead className="bg-slate-50">
            <tr>
              <Th>SKU</Th><Th>Name</Th><Th>Case Pack</Th><Th>Lead Time (d)</Th><Th>Target MOS</Th><Th>Status</Th><Th className="text-right pr-5">Actions</Th>
            </tr>
          </thead>
          <tbody>
            {rows.map(it => {
              const e = edits[it.id] || {};
              const dirty = Object.keys(e).length > 0;
              const setField = (k, v) => setEdits(prev => ({ ...prev, [it.id]: { ...(prev[it.id] || {}), [k]: v } }));
              return (
                <tr key={it.id} className={`border-t ${!it.active ? 'bg-slate-50 text-slate-400' : ''}`}>
                  <Td>
                    <input value={e.sku ?? it.sku ?? ''}
                      onChange={ev => setField('sku', ev.target.value)}
                      className="w-24 border rounded px-2 py-1" placeholder="—" />
                  </Td>
                  <Td>
                    <input value={e.name ?? it.name}
                      onChange={ev => setField('name', ev.target.value)}
                      className="w-56 border rounded px-2 py-1 font-medium" />
                  </Td>
                  <Td>
                    <input type="number" min="1" value={e.case_pack ?? it.case_pack}
                      onChange={ev => setField('case_pack', ev.target.value)}

// Burn Rate
// ─────────────────────────────────────────────────────────────
function computeRange(preset, customStart, customEnd, year) {
  const today = new Date();
  today.setUTCHours(0, 0, 0, 0);
  if (preset === '3m')  return [addDays(today, -90),  today];
  if (preset === '6m')  return [addDays(today, -180), today];
  if (preset === '12m') return [addDays(today, -365), today];
  if (preset === 'ytd') return [parseDate(`${today.getUTCFullYear()}-01-01`), today];
  if (preset === 'year' && year) return [parseDate(`${year}-01-01`), parseDate(`${year}-12-31`)];
  if (preset === 'custom' && customStart && customEnd) return [parseDate(customStart), parseDate(customEnd)];
  return [null, null];
}

function trendArrow(current, prior) {
  if (current === 0 && prior === 0) return { arrow: '→', color: 'text-slate-400', label: 'stable' };
  if (prior === 0) return { arrow: '↑', color: 'text-red-600', label: 'rising (new)' };
  const d = (current - prior) / prior;
  if (d > 0.15)  return { arrow: '↑', color: 'text-red-600',   label: `rising ${Math.round(d * 100)}%` };
  if (d < -0.15) return { arrow: '↓', color: 'text-green-600', label: `falling ${Math.round(d * 100)}%` };
  return { arrow: '→', color: 'text-slate-500', label: `stable ${Math.round(d * 100)}%` };
}

function BurnRate({ items, transactions }) {
  const [preset, setPreset] = useState('12m');
  const [year, setYear] = useState('');
  const [customStart, setCustomStart] = useState('');
  const [customEnd, setCustomEnd] = useState('');

  const years = useMemo(() => {
    const s = new Set();
    for (const tx of transactions) if (tx.date) s.add(tx.date.slice(0, 4));
    return [...s].sort();
  }, [transactions]);

  useEffect(() => {
    if (preset === 'year' && !year && years.length) setYear(years[years.length - 1]);
  }, [preset, year, years]);

  const range = useMemo(() => {
    if (preset === 'all') {
      if (!transactions.length) return [null, null];
      const dates = transactions.map(t => t.date).sort();
      return [parseDate(dates[0]), parseDate(dates[dates.length - 1])];
    }
    return computeRange(preset, customStart, customEnd, year);
  }, [preset, year, customStart, customEnd, transactions]);

  const [start, end] = range;
  const lenDays = start && end ? daysBetween(start, end) + 1 : 0;
  const priorEnd   = start ? addDays(start, -1) : null;
  const priorStart = priorEnd ? addDays(priorEnd, -(lenDays - 1)) : null;

  const data = useMemo(() => {
    if (!start || !end) return [];
    const byItem = {};
    for (const it of items) byItem[it.id] = { item: it, current: 0, prior: 0 };
    const sISO = iso(start), eISO = iso(end);
    const psISO = priorStart ? iso(priorStart) : null;
    const peISO = priorEnd   ? iso(priorEnd)   : null;
    for (const tx of transactions) {
      if (tx.quantity >= 0) continue;
      const r = byItem[tx.item_id];
      if (!r) continue;
      const u = -tx.quantity;
      if (tx.date >= sISO && tx.date <= eISO) r.current += u;
      else if (psISO && tx.date >= psISO && tx.date <= peISO) r.prior += u;
    }
    return Object.values(byItem)
      .filter(r => r.current > 0 || r.prior > 0)
      .sort((a, b) => b.current - a.current);
  }, [items, transactions, start, end, priorStart, priorEnd]);

  const chartData = data.slice(0, 8).map(r => ({
    name: truncate(r.item.name, 14),
    Current: r.current,
    Prior: r.prior,
  }));

  return (
    <div className="space-y-5">
      <h2 className="text-2xl font-bold brand-text">Burn Rate</h2>

      <div className="bg-white rounded-lg shadow p-4 flex flex-wrap items-end gap-3">
        <Field label="Range">
          <select value={preset} onChange={e => setPreset(e.target.value)} className="border rounded px-3 py-2 bg-white">
            <option value="3m">Last 3 months</option>
            <option value="6m">Last 6 months</option>
            <option value="12m">Last 12 months</option>
            <option value="ytd">Year to date</option>
            <option value="year">Full year…</option>
            <option value="all">All time</option>
            <option value="custom">Custom…</option>
          </select>
        </Field>
        {preset === 'year' && (
          <Field label="Year">
            <select value={year} onChange={e => setYear(e.target.value)} className="border rounded px-3 py-2 bg-white">
              {years.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
          </Field>
        )}
        {preset === 'custom' && (
          <>
            <Field label="Start">
              <input type="date" value={customStart} onChange={e => setCustomStart(e.target.value)} className="border rounded px-3 py-2" />
            </Field>
            <Field label="End">
              <input type="date" value={customEnd} onChange={e => setCustomEnd(e.target.value)} className="border rounded px-3 py-2" />
            </Field>
          </>
        )}
        <div className="text-sm text-slate-600 ml-auto">
          {start && end ? (
            <>
              Current: <b>{iso(start)}</b> → <b>{iso(end)}</b><br/>
              Prior:&nbsp;&nbsp; <b>{priorStart ? iso(priorStart) : '—'}</b> → <b>{priorEnd ? iso(priorEnd) : '—'}</b>
            </>
          ) : <span>Select a range</span>}
        </div>
      </div>

      <Section title="Top 8 items — current vs. prior period">
        <div className="p-4" style={{ width: '100%', height: 360 }}>
          {!R ? (
            <div className="text-center text-slate-500 py-12">Chart library unavailable.</div>
          ) : chartData.length > 0 ? (
            <R.ResponsiveContainer width="100%" height="100%">
              <R.BarChart data={chartData} margin={{ top: 10, right: 20, left: 0, bottom: 40 }}>
                <R.CartesianGrid strokeDasharray="3 3" />
                <R.XAxis dataKey="name" interval={0} angle={-30} textAnchor="end" height={60} />
                <R.YAxis />
                <R.Tooltip />
                <R.Legend />
                <R.Bar dataKey="Prior"   fill="#94A3B8" />
                <R.Bar dataKey="Current" fill="#0D2137" />
              </R.BarChart>
            </R.ResponsiveContainer>
          ) : (
            <div className="text-center text-slate-500 py-12">No usage in this period.</div>
          )}
        </div>
      </Section>

      <Section title="Usage by item">
        <Table>
          <thead className="bg-slate-50">
            <tr>
              <Th>Item</Th><Th>Current Usage</Th><Th>Prior Usage</Th><Th>Change</Th><Th>Trend</Th>
            </tr>
          </thead>
          <tbody>
            {data.map(r => {
              const t = trendArrow(r.current, r.prior);
              const delta = r.current - r.prior;
              return (
                <tr key={r.item.id} className="border-t">
                  <Td className="font-medium">{r.item.name}</Td>
                  <Td>{fmt(r.current)}</Td>
                  <Td>{fmt(r.prior)}</Td>
                  <Td className={delta > 0 ? 'text-red-600' : delta < 0 ? 'text-green-600' : 'text-slate-500'}>
                    {delta > 0 ? '+' : ''}{fmt(delta)}
                  </Td>
                  <Td><span className={`text-xl font-bold ${t.color}`} title={t.label}>{t.arrow}</span> <span className="text-xs text-slate-500">{t.label}</span></Td>
                </tr>
              );
            })}
            {data.length === 0 && (
              <tr><td colSpan="5" className="text-center py-6 text-slate-500">No usage in range.</td></tr>
            )}
          </tbody>
        </Table>
      </Section>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Item name cleaning (go-live rules)
//   - "<size> white/black" → "<size> wb"
//   - "<size> white/tan"   → "<size> wt"
//   - "<size>wt (anything)" → "<size> wt"
//   - sibling rule: if an item is white/black for a size and another item
//     has that exact size with no color label, the sibling becomes wt.
// ─────────────────────────────────────────────────────────────
const NAME_RE_WB    = /\s*white\s*[\/\\]?\s*black\s*$/i;
const NAME_RE_WT    = /\s*white\s*[\/\\]?\s*tan\s*$/i;
const NAME_RE_WT_PAREN = /\s*wt\s*\(.*?\)\s*$/i;

function classifyName(rawName) {
  const trimmed = (rawName || '').trim();
  if (NAME_RE_WB.test(trimmed))       return { size: trimmed.replace(NAME_RE_WB, '').trim(),       color: 'wb' };
  if (NAME_RE_WT.test(trimmed))       return { size: trimmed.replace(NAME_RE_WT, '').trim(),       color: 'wt' };
  if (NAME_RE_WT_PAREN.test(trimmed)) return { size: trimmed.replace(NAME_RE_WT_PAREN, '').trim(), color: 'wt' };
  return { size: trimmed, color: null };
}

function buildNameRenameMap(rawNames) {
  const entries = rawNames.map(n => ({ raw: n, ...classifyName(n) }));
  const wbSizes = new Set(entries.filter(e => e.color === 'wb').map(e => e.size.toLowerCase()));
  for (const e of entries) {
    if (!e.color && wbSizes.has(e.size.toLowerCase())) e.color = 'wt';
  }
  const map = {};
  for (const e of entries) {
    if (e.color) map[e.raw] = `${e.size} ${e.color}`;
  }
  return map;
}

// ─────────────────────────────────────────────────────────────
// Import
// ─────────────────────────────────────────────────────────────
function ImportPage({ transactions, items, onComplete }) {
  const [itemsCsv, setItemsCsv] = useState(null);
  const [txCsv, setTxCsv]       = useState(null);
  const [status, setStatus]     = useState('');
  const [running, setRunning]   = useState(false);
  const [summary, setSummary]   = useState(null);
  const [progress, setProgress] = useState(null);
  const [wipeText, setWipeText] = useState('');

  const hasExistingTx = transactions.length > 0;

  async function tryRepoLoad() {
    setStatus('Fetching CSVs from project directory…');
    try {
      const [r1, r2] = await Promise.all([
        fetch('./import_items.csv'),
        fetch('./import_transactions.csv'),
      ]);
      if (!r1.ok) throw new Error('import_items.csv not accessible at ./import_items.csv');
      if (!r2.ok) throw new Error('import_transactions.csv not accessible at ./import_transactions.csv');
      const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
      setItemsCsv({ text: t1, name: 'import_items.csv (from repo)' });
      setTxCsv({ text: t2, name: 'import_transactions.csv (from repo)' });
      setStatus('Loaded from repo. Click Run Import.');
    } catch (e) {
      setStatus('Could not fetch from repo: ' + e.message + '. Use file upload instead.');
    }
  }

  function onFile(file, which) {
    const reader = new FileReader();
    reader.onload = () => {
      const rec = { text: reader.result, name: file.name };
      if (which === 'items') setItemsCsv(rec); else setTxCsv(rec);
    };
    reader.readAsText(file);
  }

  async function runImport() {
    if (!itemsCsv || !txCsv) { setStatus('Select both CSV files first.'); return; }

    setRunning(true);
    setSummary(null);
    setProgress(null);
    try {
      // ── Items
      setStatus('Parsing items CSV…');
      const itemsParsed = window.Papa.parse(itemsCsv.text, { header: true, skipEmptyLines: true }).data;
      const rawNames = itemsParsed.filter(r => r.name && r.name.trim()).map(r => r.name.trim());
      const renameMap = buildNameRenameMap(rawNames);
      const normItems = itemsParsed
        .filter(r => r.name && r.name.trim())
        .map(r => {
          const raw = r.name.trim();
          return {
            sku: (r.sku || '').trim() || null,
            name: renameMap[raw] || raw,
            case_pack: parseInt(r.case_pack) || 1,
            lead_time_days: parseInt(r.lead_time_days) || 30,
            target_mos: parseInt(r.target_mos) || 3,
            active: (r.active === 'True' || r.active === 'true' || r.active === true || r.active === '1'),
          };
        });

      setStatus('Checking existing items…');
      const existing = await fetchAll('items');
      const existingNames = new Set(existing.map(i => i.name));
      const existingSkus  = new Set(existing.filter(i => i.sku).map(i => i.sku));
      const toInsert = normItems.filter(i =>
        !existingNames.has(i.name) && !(i.sku && existingSkus.has(i.sku))
      );

      if (toInsert.length > 0) {
        setStatus(`Inserting ${toInsert.length} new item(s)…`);
        const { error } = await sb.from('items').insert(toInsert);
        if (error) throw new Error('Items insert failed: ' + error.message);
      }

      // Rebuild lookup maps (SKU takes priority over name)
      setStatus('Fetching item IDs…');
      const allItems = await fetchAll('items');
      const nameToId = Object.fromEntries(allItems.map(i => [i.name, i.id]));
      const skuToId  = Object.fromEntries(allItems.filter(i => i.sku).map(i => [i.sku, i.id]));

      // ── Transactions
      setStatus('Parsing transactions CSV…');
      const txParsed = window.Papa.parse(txCsv.text, { header: true, skipEmptyLines: true }).data;
      const normTx = [];
      const unmatched = new Map();
      for (const r of txParsed) {
        if (!r.date) continue;
        const sku  = (r.sku || r.item_sku || '').trim();
        const rawName = (r.item_name || '').trim();
        const name = renameMap[rawName] || rawName;
        const id = (sku && skuToId[sku]) || (name && nameToId[name]);
        if (!id) {
          const label = sku || name || '(blank)';
          unmatched.set(label, (unmatched.get(label) || 0) + 1);
          continue;
        }
        const q = parseInt(r.quantity);
        if (isNaN(q)) continue;
        normTx.push({
          date: r.date,
          po_number: (r.po_number || '').trim() || null,
          item_id: id,
          quantity: q,
        });
      }

      // Dedup against existing transactions using a (date|item_id|qty|po) key
      setStatus('Checking for duplicates…');
      const keyOf = t => `${t.date}|${t.item_id}|${t.quantity}|${t.po_number || ''}`;
      const existingTx = await fetchAll('transactions');
      const existingKeys = new Set(existingTx.map(keyOf));
      const beforeDedup = normTx.length;
      const toInsertTx = normTx.filter(t => !existingKeys.has(keyOf(t)));
      const skippedDup = beforeDedup - toInsertTx.length;

      const BATCH = 500;
      let inserted = 0;
      for (let i = 0; i < toInsertTx.length; i += BATCH) {
        const batch = toInsertTx.slice(i, i + BATCH);
        setProgress({ done: i, total: toInsertTx.length });
        setStatus(`Inserting transactions ${i + 1}–${Math.min(i + batch.length, toInsertTx.length)} of ${toInsertTx.length}…`);
        const { error } = await sb.from('transactions').insert(batch);
        if (error) throw new Error('Transactions insert failed: ' + error.message);
        inserted += batch.length;
      }

      setSummary({
        itemsInserted: toInsert.length,
        itemsSkipped: normItems.length - toInsert.length,
        txParsed: txParsed.length,
        txInserted: inserted,
        txSkippedDup: skippedDup,
        unmatched: [...unmatched.entries()].map(([k, v]) => `${k} (${v} row${v === 1 ? '' : 's'})`),
      });
      setStatus('Import complete.');
      setProgress(null);
      onComplete();
    } catch (e) {
      setStatus('Error: ' + e.message);
    } finally {
      setRunning(false);
    }
  }

  async function wipeAndReimport() {
    if (!itemsCsv || !txCsv) { setStatus('Select both CSV files first.'); return; }
    if (wipeText !== 'WIPE') { setStatus('Type WIPE to confirm.'); return; }
    setRunning(true);
    setSummary(null);
    setProgress(null);
    try {
      setStatus('Deleting transaction audits…');
      let r = await sb.from('transaction_audits').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      if (r.error) throw new Error('Delete audits failed: ' + r.error.message);

      setStatus('Deleting transactions…');
      r = await sb.from('transactions').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      if (r.error) throw new Error('Delete transactions failed: ' + r.error.message);

      setStatus('Deleting items…');
      r = await sb.from('items').delete().neq('id', '00000000-0000-0000-0000-000000000000');
      if (r.error) throw new Error('Delete items failed: ' + r.error.message);

      setWipeText('');
      onComplete();
    } catch (e) {
      setStatus('Error: ' + e.message);
      setRunning(false);
      return;
    }
    setRunning(false);
    await runImport();
  }

  return (
    <div className="space-y-5">
      <h2 className="text-2xl font-bold brand-text">Import</h2>

      <Section title="CSV Sources">
        <div className="p-5 space-y-4">
          <div>
            <button onClick={tryRepoLoad} disabled={running} className="brand text-white px-4 py-2 rounded text-sm disabled:opacity-50">
              Load from repo (./import_items.csv &amp; ./import_transactions.csv)
            </button>
            <p className="text-xs text-slate-500 mt-2">
              Works after deploy to Netlify as long as both CSVs sit at the static site root.
            </p>
          </div>
          <div className="border-t pt-4 grid md:grid-cols-2 gap-4">
            <Field label="items CSV (sku*, name, case_pack, lead_time_days, target_mos, active)">
              <input type="file" accept=".csv,text/csv" onChange={e => e.target.files[0] && onFile(e.target.files[0], 'items')} className="text-sm" />
              {itemsCsv && <div className="text-xs text-green-700 mt-1">✓ {itemsCsv.name}</div>}
            </Field>
            <Field label="transactions CSV (date, po_number, sku* or item_name, quantity)">
              <input type="file" accept=".csv,text/csv" onChange={e => e.target.files[0] && onFile(e.target.files[0], 'tx')} className="text-sm" />
              {txCsv && <div className="text-xs text-green-700 mt-1">✓ {txCsv.name}</div>}
            </Field>
            <div className="md:col-span-2 text-xs text-slate-500">* sku optional; if present it takes priority over name when matching.</div>
          </div>
        </div>
      </Section>

      <Section title="Run Import">
        <div className="p-5 space-y-3">
          {hasExistingTx && (
            <div className="bg-slate-50 border border-slate-300 rounded p-3 text-sm text-slate-700">
              {transactions.length.toLocaleString()} transaction(s) already in the database. Re-running the import is safe — matching rows (same date, item, quantity, PO#) are automatically skipped.
            </div>
          )}
          <button onClick={runImport} disabled={running || !itemsCsv || !txCsv}
            className="bg-green-600 text-white px-5 py-2 rounded font-medium disabled:opacity-50">
            {running ? 'Running…' : 'Run Import'}
          </button>
          {status && <div className="text-sm text-slate-700">{status}</div>}
          {progress && (
            <div className="w-full bg-slate-200 rounded h-2">
              <div className="brand h-2 rounded" style={{ width: `${Math.round((progress.done / progress.total) * 100)}%` }}></div>
            </div>
          )}
          {summary && (
            <div className="bg-slate-50 border rounded p-4 text-sm space-y-1">
              <div><b>Items inserted:</b> {summary.itemsInserted}</div>
              <div><b>Items skipped (already existed):</b> {summary.itemsSkipped}</div>
              <div><b>Transactions parsed:</b> {summary.txParsed}</div>
              <div><b>Transactions inserted:</b> {summary.txInserted}</div>
              <div><b>Transactions skipped (duplicate of existing):</b> {summary.txSkippedDup ?? 0}</div>
              {summary.unmatched.length > 0 && (
                <div>
                  <b className="text-red-700">Unmatched item names ({summary.unmatched.length}):</b>
                  <ul className="list-disc ml-6 text-red-700">
                    {summary.unmatched.map(u => <li key={u}>{u}</li>)}
                  </ul>
                </div>
              )}
            </div>
          )}
        </div>
      </Section>

      <Section title="Go-Live: Wipe All Data & Reimport">
        <div className="p-5 space-y-3">
          <div className="bg-red-50 border border-red-300 rounded p-3 text-sm text-red-800">
            <b>Destructive.</b> Deletes every row from <code>transaction_audits</code>, <code>transactions</code>, and <code>items</code>, then runs the import from the loaded CSVs. Use this only for go-live (or to reset to a clean state).
          </div>
          <div className="flex flex-wrap items-center gap-2">
            <input
              value={wipeText}
              onChange={e => setWipeText(e.target.value)}
              placeholder="Type WIPE to enable"
              className="border rounded px-3 py-2 text-sm w-56"
              disabled={running}
            />
            <button
              onClick={wipeAndReimport}
              disabled={running || !itemsCsv || !txCsv || wipeText !== 'WIPE'}
              className="bg-red-600 text-white px-5 py-2 rounded font-medium disabled:opacity-50">
              {running ? 'Running…' : 'Wipe All Data & Reimport'}
            </button>
          </div>
        </div>
      </Section>
    </div>
  );
}

// Export
// ─────────────────────────────────────────────────────────────
function ExportPage({ items, transactions }) {
  const metrics = useMemo(() => calcMetrics(items, transactions), [items, transactions]);
  function download() {
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();

    const txRows = [...transactions]
      .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0))
      .map(t => {
        const it = items.find(i => i.id === t.item_id);
        return {
          Date: t.date,
          'PO#': t.po_number || '',
          SKU: it?.sku || '',
          Item: it ? it.name : '(unknown)',
          Quantity: t.quantity,
          'Entered By': t.user_email || '',
        };
      });
    const s1 = XLSX.utils.json_to_sheet(txRows);
    XLSX.utils.book_append_sheet(wb, s1, 'Transactions');

    const poRows = metrics
      .sort((a, b) => a.item.name.localeCompare(b.item.name))
      .map(m => ({
        SKU: m.item.sku || '',
        Item: m.item.name,
        Active: m.item.active ? 'Yes' : 'No',
        'On Hand': m.onHand,
        '12M Usage': m.usage12m,
        'Avg/Mo': Number(m.avgMonthly.toFixed(2)),
        MOS: m.mos === null ? '' : Number(m.mos.toFixed(2)),
        'Days Left': m.daysLeft === null ? '' : Math.round(m.daysLeft),
        'Target MOS': m.item.target_mos,
        'Target Stock': Math.round(m.targetStock),
        'Case Pack': m.item.case_pack,
        'Lead Time (d)': m.item.lead_time_days,
        'Suggested Order': m.suggested,
        Status: m.status,
      }));
    const s2 = XLSX.utils.json_to_sheet(poRows);
    XLSX.utils.book_append_sheet(wb, s2, 'PO Guidance');

    XLSX.writeFile(wb, `scott-inventory-${iso(new Date())}.xlsx`);
  }

  return (
    <div className="space-y-4">
      <h2 className="text-2xl font-bold brand-text">Export</h2>
      <div className="bg-white rounded-lg shadow p-6 max-w-xl">
        <p className="mb-4 text-slate-700">
          Download an Excel workbook with two sheets:
        </p>
        <ul className="list-disc ml-6 mb-5 text-slate-700 text-sm">
          <li><b>Transactions</b> — every row, oldest first ({transactions.length} row{transactions.length === 1 ? '' : 's'}).</li>
          <li><b>PO Guidance</b> — current snapshot with all calculated fields ({items.length} item{items.length === 1 ? '' : 's'}).</li>
        </ul>
        <button onClick={download} className="brand text-white px-5 py-2 rounded font-medium">Download .xlsx</button>
      </div>
    </div>
  );
}

function ReportsPage({ items, transactions }) {
  const [txStart, setTxStart] = useState('');
  const [txEnd, setTxEnd] = useState(iso(new Date()));

  const metrics = useMemo(() => calcMetrics(items, transactions), [items, transactions]);
  const active = metrics.filter(m => m.item.active);

  function writeWb(sheets, name) {
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();
    for (const [sheetName, rows] of sheets) {
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), sheetName);
    }
    XLSX.writeFile(wb, `${name}-${iso(new Date())}.xlsx`);
  }

  function reorderReport() {
    const rows = active
      .filter(m => m.status === 'Reorder')
      .sort((a, b) => (a.mos ?? 0) - (b.mos ?? 0))
      .map(m => ({
        SKU: m.item.sku || '',
        Item: m.item.name,
        'On Hand': m.onHand,
        'Avg/Mo': Number(m.avgMonthly.toFixed(2)),
        MOS: m.mos === null ? '' : Number(m.mos.toFixed(2)),
        'Target MOS': m.item.target_mos,
        'Lead Time (d)': m.item.lead_time_days,
        'Case Pack': m.item.case_pack,
        'Suggested Order': m.suggested,
      }));
    writeWb([['Reorder', rows]], 'reorder-report');
  }

  function inventorySnapshot() {
    const rows = [...active]
      .sort((a, b) => a.item.name.localeCompare(b.item.name))
      .map(m => ({
        SKU: m.item.sku || '',
        Item: m.item.name,
        'On Hand': m.onHand,
        '12M Usage': m.usage12m,
        'Avg/Mo': Number(m.avgMonthly.toFixed(2)),
        MOS: m.mos === null ? '' : Number(m.mos.toFixed(2)),
        'Days Left': m.daysLeft === null ? '' : Math.round(m.daysLeft),
        'Target MOS': m.item.target_mos,
        'Lead Time (d)': m.item.lead_time_days,
        'Target Stock': Math.round(m.targetStock),
        'Case Pack': m.item.case_pack,
        'Suggested Order': m.suggested,
        Status: m.status,
      }));
    writeWb([['Inventory', rows]], 'inventory-snapshot');
  }

  function transactionHistory() {
    const filtered = transactions.filter(t => {
      if (txStart && t.date < txStart) return false;
      if (txEnd && t.date > txEnd) return false;
      return true;
    });
    const rows = filtered
      .sort((a, b) => a.date.localeCompare(b.date))
      .map(t => {
        const it = items.find(i => i.id === t.item_id);
        return {
          Date: t.date,
          'PO#': t.po_number || '',
          SKU: it?.sku || '',
          Item: it ? it.name : '(unknown)',
          Quantity: t.quantity,
          Type: t.quantity < 0 ? 'Usage' : 'Receipt',
          'Entered By': t.user_email || '',
        };
      });
    writeWb([['Transactions', rows]], `transactions-${txStart || 'start'}-to-${txEnd || iso(new Date())}`);
  }

  function monthlyUsage() {
    const today = new Date();
    const months = [];
    for (let i = 23; i >= 0; i--) {
      const d = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth() - i, 1));
      months.push(d.toISOString().slice(0, 7));
    }
    const first = months[0] + '-01';
    const byItem = {};
    for (const it of items) if (it.active) byItem[it.id] = { item: it, months: Object.fromEntries(months.map(m => [m, 0])) };
    for (const tx of transactions) {
      if (tx.quantity >= 0 || tx.date < first) continue;
      const r = byItem[tx.item_id]; if (!r) continue;
      const m = tx.date.slice(0, 7);
      if (m in r.months) r.months[m] += -tx.quantity;
    }
    const rows = Object.values(byItem)
      .sort((a, b) => a.item.name.localeCompare(b.item.name))
      .map(r => {
        const obj = { SKU: r.item.sku || '', Item: r.item.name };
        let total = 0;
        for (const m of months) { obj[m] = r.months[m]; total += r.months[m]; }
        obj.Total = total;
        return obj;
      });
    writeWb([['Monthly Usage', rows]], 'monthly-usage');
  }

  function usageSummary() {
    const today = new Date();
    const c = {
      m1:  iso(addDays(today, -30)),
      m3:  iso(addDays(today, -90)),
      m6:  iso(addDays(today, -180)),
      m12: iso(addDays(today, -365)),
    };
    const byItem = {};
    for (const it of items) if (it.active) byItem[it.id] = { item: it, m1: 0, m3: 0, m6: 0, m12: 0 };
    for (const tx of transactions) {
      if (tx.quantity >= 0) continue;
      const r = byItem[tx.item_id]; if (!r) continue;
      const u = -tx.quantity;
      if (tx.date >= c.m1)  r.m1  += u;
      if (tx.date >= c.m3)  r.m3  += u;
      if (tx.date >= c.m6)  r.m6  += u;
      if (tx.date >= c.m12) r.m12 += u;
    }
    const rows = Object.values(byItem)
      .sort((a, b) => a.item.name.localeCompare(b.item.name))
      .map(r => ({
        SKU: r.item.sku || '',
        Item: r.item.name,
        'Last 1M':  r.m1,
        'Last 3M':  r.m3,
        'Last 6M':  r.m6,
        'Last 12M': r.m12,
        'Avg/Mo (12M)': Number((r.m12 / 12).toFixed(2)),
      }));
    writeWb([['Usage Summary', rows]], 'usage-summary');
  }

  function stockoutRisk() {
    const rows = active
      .filter(m => m.avgMonthly > 0)
      .map(m => {
        const deficitDays = m.daysLeft !== null ? m.daysLeft - m.item.lead_time_days : null;
        return {
          SKU: m.item.sku || '',
          Item: m.item.name,
          'On Hand': m.onHand,
          'Avg/Mo': Number(m.avgMonthly.toFixed(2)),
          'Lead Time (d)': m.item.lead_time_days,
          'Days of Supply': m.daysLeft === null ? '' : Math.round(m.daysLeft),
          'Days vs Lead Time': deficitDays === null ? '' : Math.round(deficitDays),
          'At Risk': deficitDays !== null && deficitDays < 0 ? 'YES' : '',
        };
      })
      .sort((a, b) => {
        const av = typeof a['Days vs Lead Time'] === 'number' ? a['Days vs Lead Time'] : 9e9;
        const bv = typeof b['Days vs Lead Time'] === 'number' ? b['Days vs Lead Time'] : 9e9;
        return av - bv;
      });
    writeWb([['Stockout Risk', rows]], 'stockout-risk');
  }

  const cards = [
    {
      title: 'Reorder Report',
      desc: `Items currently flagged for reorder (${active.filter(m => m.status === 'Reorder').length}). Suggested order quantities rounded up to case pack.`,
      action: reorderReport,
    },
    {
      title: 'Inventory Snapshot',
      desc: `All active items with on-hand, MOS, target stock, and status (${active.length}).`,
      action: inventorySnapshot,
    },
    {
      title: 'Transaction History',
      desc: 'All transactions in a date range, classified as Usage or Receipt.',
      action: transactionHistory,
      customControls: true,
    },
    {
      title: 'Monthly Usage',
      desc: 'Item × month usage matrix for the last 24 months with row totals.',
      action: monthlyUsage,
    },
    {
      title: 'Usage Summary',
      desc: 'Usage totals per item over 1, 3, 6, and 12-month windows.',
      action: usageSummary,
    },
    {
      title: 'Stockout Risk',
      desc: 'Items whose days-of-supply is less than their lead time — flagged "YES" in the At Risk column.',
      action: stockoutRisk,
    },
  ];

  return (
    <div className="space-y-5">
      <h2 className="text-2xl font-bold brand-text">Reports</h2>
      <p className="text-sm text-slate-600">
        Each report downloads as an Excel file (.xlsx). All calculations use today's data.
      </p>
      <div className="grid md:grid-cols-2 gap-4">
        {cards.map(c => (
          <div key={c.title} className="bg-white rounded-lg shadow p-5 flex flex-col">
            <h3 className="font-semibold brand-text text-lg mb-1">{c.title}</h3>
            <p className="text-sm text-slate-600 mb-4">{c.desc}</p>
            {c.customControls && (
              <div className="flex gap-3 mb-4">
                <Field label="From">
                  <input type="date" value={txStart} onChange={e => setTxStart(e.target.value)} className="border rounded px-2 py-1 text-sm" />
                </Field>
                <Field label="To">
                  <input type="date" value={txEnd} onChange={e => setTxEnd(e.target.value)} className="border rounded px-2 py-1 text-sm" />
                </Field>
              </div>
            )}
            <button onClick={c.action} className="mt-auto brand text-white px-4 py-2 rounded text-sm font-medium self-start">
              Download .xlsx
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

// Audit Log
// ─────────────────────────────────────────────────────────────
function AuditLog({ items }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [actionFilter, setActionFilter] = useState('all');
  const [search, setSearch] = useState('');
  const itemMap = useMemo(() => Object.fromEntries(items.map(i => [i.id, i])), [items]);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const { data, error } = await sb.from('transaction_audits')
        .select('*')
        .order('changed_at', { ascending: false })
        .limit(500);
      if (error) setErr(error.message);
      else setRows(data || []);
      setLoading(false);
    })();
  }, []);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return rows.filter(r => {
      if (actionFilter !== 'all' && r.action !== actionFilter) return false;
      if (q) {
        const it = itemMap[r.before_data?.item_id];
        const hay = [it?.name, it?.sku, r.before_data?.po_number, r.changed_by].filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [rows, actionFilter, search, itemMap]);

  function describeDiff(r) {
    if (r.action === 'delete') return <span className="text-red-600 text-xs">Deleted</span>;
    const b = r.before_data || {};
    const a = r.after_data || {};
    const changes = [];
    for (const k of ['date', 'po_number', 'item_id', 'quantity']) {
      if ((b[k] ?? '') !== (a[k] ?? '')) {
        let before = b[k], after = a[k];
        if (k === 'item_id') {
          before = itemMap[before]?.name || before || '—';
          after  = itemMap[after]?.name  || after  || '—';
        }
        changes.push(`${k}: ${before ?? '—'} → ${after ?? '—'}`);
      }
    }
    return <span className="text-xs text-slate-700">{changes.join(', ') || '(no change)'}</span>;
  }

  return (
    <div className="space-y-4">
      <h2 className="text-2xl font-bold brand-text">Audit Log</h2>
      <p className="text-sm text-slate-600">
        Every edit and delete to transactions is recorded here. Shows the most recent 500 audit entries.
      </p>

      <div className="bg-white rounded-lg shadow p-4 flex flex-wrap items-end gap-3">
        <Field label="Search">
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="item, SKU, PO#, user…" className="border rounded px-3 py-2 w-64" />
        </Field>
        <Field label="Action">
          <select value={actionFilter} onChange={e => setActionFilter(e.target.value)} className="border rounded px-3 py-2 bg-white">
            <option value="all">All</option>
            <option value="edit">Edits</option>
            <option value="delete">Deletes</option>
          </select>
        </Field>
        <button onClick={() => { setSearch(''); setActionFilter('all'); }} className="text-sm text-slate-600 hover:underline ml-auto">Clear filters</button>
      </div>

      {err && <div className="bg-red-100 text-red-800 p-3 rounded">{err}</div>}

      <Section title={`${filtered.length.toLocaleString()} audit entr${filtered.length === 1 ? 'y' : 'ies'}`}>
        <Table>
          <thead className="bg-slate-50">
            <tr>
              <Th>When</Th><Th>Action</Th><Th>By</Th><Th>Item</Th><Th>Qty</Th><Th>Date</Th><Th>PO#</Th><Th>Change</Th>
            </tr>
          </thead>
          <tbody>
            {loading && <tr><td colSpan="8" className="text-center py-6 text-slate-500">Loading…</td></tr>}
            {!loading && filtered.map(r => {
              const b = r.before_data || {};
              const it = itemMap[b.item_id];
              return (
                <tr key={r.id} className="border-t">
                  <Td className="text-xs text-slate-500">{new Date(r.changed_at).toLocaleString()}</Td>
                  <Td><span className={`inline-block px-2 py-0.5 text-xs font-semibold rounded ${r.action === 'delete' ? 'bg-red-600 text-white' : 'bg-slate-600 text-white'}`}>{r.action}</span></Td>
                  <Td className="text-xs text-slate-500">{r.changed_by || ''}</Td>
                  <Td className="font-medium">
                    {it?.sku && <span className="text-slate-500 mr-2">{it.sku}</span>}
                    {it?.name || <span className="text-red-600">(unknown)</span>}
                  </Td>
                  <Td className={b.quantity < 0 ? 'text-red-600' : 'text-green-700'}>{b.quantity > 0 ? '+' : ''}{b.quantity}</Td>
                  <Td>{b.date}</Td>
                  <Td>{b.po_number || ''}</Td>
                  <Td>{describeDiff(r)}</Td>
                </tr>
              );
            })}
            {!loading && filtered.length === 0 && (
              <tr><td colSpan="8" className="text-center py-6 text-slate-500">No audit entries match.</td></tr>
            )}
          </tbody>
        </Table>
      </Section>
    </div>
  );
}

              <dt className="font-semibold text-slate-600">Product</dt><dd className="col-span-2">{selected.product || '—'}</dd>
            </dl>
            <div className="text-sm font-semibold text-slate-600 mb-1">Message</div>
            <div className="bg-slate-50 rounded p-3 text-sm whitespace-pre-wrap">{selected.message || '(no message)'}</div>
            <div className="flex justify-end mt-5">
              <button onClick={() => setSelected(null)} className="brand text-white px-4 py-2 rounded font-medium">Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Main app shell
// ─────────────────────────────────────────────────────────────
function MainApp({ session, signOut }) {
  const [page, setPage]                 = useState('dashboard');
  const [items, setItems]               = useState([]);
  const [transactions, setTransactions] = useState([]);
  const [loading, setLoading]           = useState(true);
  const [err, setErr]                   = useState('');

  const refresh = useCallback(async () => {
    setErr('');
    try {
      const [i, t] = await Promise.all([fetchAll('items', 'name'), fetchAll('transactions', 'date')]);
      setItems(i);
      setTransactions(t);
    } catch (e) {
      setErr(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  const pages = [
    ['dashboard',   'Dashboard'],
    ['transaction', 'Enter Transaction'],
    ['history',     'Transactions'],
    ['items',       'Items'],
    ['po',          'PO Guidance'],
    ['burn',        'Burn Rate'],
    ['reports',     'Reports'],
    ['leads',       'Quote Requests'],
    ['audit',       'Audit Log'],
    ['import',      'Import'],
    ['export',      'Export'],
  ];

  return (
    <div className="min-h-screen bg-ink-bg text-fog">
      <nav className="bg-ink-panel2 border-b border-ink-line">
        <div className="max-w-7xl mx-auto px-6 py-3 flex flex-wrap items-center gap-4">
          <div className="flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-md bg-ok text-ink-bg flex items-center justify-center font-black text-sm">S</div>
            <h1 className="text-[15px] font-bold text-fog">Scott Inventory</h1>
          </div>
          <div className="flex flex-wrap gap-1">
            {pages.map(([id, label]) => (
              <button key={id} onClick={() => setPage(id)}
                className={`px-3 py-1.5 rounded-md text-[12px] font-medium transition-colors ${page === id ? 'bg-okdim text-fog border border-ok/40' : 'text-fog-mute hover:text-fog hover:bg-ink-panel'}`}>
                {label}
              </button>
            ))}
          </div>
          <div className="ml-auto flex items-center gap-3 text-[12px]">
            <span className="text-fog-mute hidden sm:inline">{session.user.email}</span>
            <button onClick={signOut} className="text-fog-mute hover:text-fog px-3 py-1 rounded-md border border-ink-line hover:border-ink-lineX">Sign Out</button>
          </div>
        </div>
      </nav>
      <main className="max-w-7xl mx-auto p-6">
        {err && <div className="bg-dangerdim text-danger p-3 rounded-md mb-4 border border-danger/30">{err}</div>}
        {loading ? (
          <div className="text-fog-mute">Loading…</div>
        ) : (
          <>
            {page === 'dashboard'   && <Dashboard          items={items} transactions={transactions} />}
            {page === 'transaction' && <TransactionPage    items={items} session={session} onSaved={refresh} />}
            {page === 'history'     && <TransactionsHistory items={items} transactions={transactions} session={session} onChange={refresh} />}
            {page === 'items'       && <ItemsPage          items={items} onChange={refresh} />}
            {page === 'po'          && <POGuidance         items={items} transactions={transactions} />}
            {page === 'burn'        && <BurnRate           items={items} transactions={transactions} />}
            {page === 'reports'     && <ReportsPage        items={items} transactions={transactions} />}
            {page === 'leads'       && <QuoteRequests />}
            {page === 'audit'       && <AuditLog           items={items} />}
            {page === 'import'      && <ImportPage         items={items} transactions={transactions} onComplete={refresh} />}
            {page === 'export'      && <ExportPage         items={items} transactions={transactions} />}
          </>
        )}
      </main>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Root
// ─────────────────────────────────────────────────────────────
function App() {
  const [session, setSession]   = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [tablesOk, setTablesOk] = useState(null);
  const [checking, setChecking] = useState(false);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setAuthReady(true);
    });
    const { data } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => data.subscription.unsubscribe();
  }, []);

  const checkTables = useCallback(async () => {
    setChecking(true);
    const tableChecks = await Promise.all([
      sb.from('items').select('id').limit(1),
      sb.from('transactions').select('id').limit(1),
      sb.from('transaction_audits').select('id').limit(1),
      sb.from('form_submissions').select('id').limit(1),
    ]);
    const tableMissing = (e) => e && (
      e.code === '42P01' ||
      e.code === 'PGRST205' ||
      /relation .* does not exist/i.test(e.message || '') ||
      /schema cache/i.test(e.message || '')
    );
    if (tableChecks.some(r => tableMissing(r.error))) {
      setTablesOk(false);
      setChecking(false);
      return;
    }
    // Column migration check
    const colChecks = await Promise.all([
      sb.from('items').select('sku').limit(1),
      sb.from('transactions').select('user_email').limit(1),
    ]);
    const colMissing = (e) => e && (
      e.code === '42703' ||
      e.code === 'PGRST204' ||
      /column .* does not exist/i.test(e.message || '')
    );
    setTablesOk(!colChecks.some(r => colMissing(r.error)));
    setChecking(false);
  }, []);

  useEffect(() => { if (session) checkTables(); }, [session, checkTables]);

  if (!authReady) return <div className="min-h-screen flex items-center justify-center text-slate-500">Loading…</div>;
  if (!session)   return <LoginScreen />;
  if (tablesOk === null || checking) return <div className="min-h-screen flex items-center justify-center text-slate-500">Checking database…</div>;
  if (tablesOk === false) return <SetupScreen onRetry={checkTables} />;
  return <MainApp session={session} signOut={() => sb.auth.signOut()} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
